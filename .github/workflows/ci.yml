name: CI

# Runs on every push and PR against main/develop. This is the project's
# first CI pipeline (see CHANGELOG_PHASE9.md) — previously there was no
# automated check at all, so a broken seed script, an unmounted route file,
# or a hardcoded sandbox URL could only ever be caught by hand.
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20.x'

jobs:
  backend:
    name: Backend — lint, test, audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run test suite (jest)
        run: npm test -- --ci --coverage
        env:
          JWT_SECRET: ci-test-secret-not-for-production
          NODE_ENV: test
          MONGO_URI: mongodb://localhost:27017/ruaitech_ci_test

      - name: Security audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Check for vulnerabilities
        run: |
          npm audit --audit-level=high --json > audit-results.json || true
          if [ -s audit-results.json ] && ! jq -r '.metadata.vulnerabilities.high // 0' audit-results.json | grep -q '^0$'; then
            echo "High severity vulnerabilities detected:"
            jq -r '.actions[]? | .resolves[]? | "Package: \(.module), Vuln: \(.id)"' audit-results.json || true
          fi

      - name: Confirm server.js parses cleanly
        run: node -c server.js

      - name: Confirm seed.js parses cleanly
        run: node -c seed.js

  frontend:
    name: Frontend — lint, test, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: |
          # Check if eslint config exists and run accordingly
          if [ -f eslint.config.js ]; then
            npx eslint src --ext .js,.jsx --max-warnings 10
          else
            echo "ESLint config not found, skipping lint"
          fi
        continue-on-error: true

      - name: Type checking (if TypeScript is present)
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Run component tests (vitest)
        run: npm test -- --ci --coverage
        continue-on-error: true

      - name: Production build
        run: npm run build
        env:
          VITE_API_URL: https://api.placeholder.invalid # build-time only; real value comes from each environment's own config

      - name: Security audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

  security-scan:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
        continue-on-error: true

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  simulation-smoke-test:
    name: End-to-end simulation smoke test
    runs-on: ubuntu-latest
    needs: [backend]
    services:
      mongodb:
        image: mongo:7
        ports: ['27017:27017']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Start backend server in the background
        working-directory: backend
        run: |
          nohup node server.js &
          sleep 5
          timeout 30 bash -c 'until curl -f http://localhost:5001/api/health; do sleep 2; done' || exit 1
        env:
          MONGO_URI: mongodb://localhost:27017/ruaitech_ci
          JWT_SECRET: ci-test-secret-not-for-production
          PORT: 5001
          NODE_ENV: test
          MPESA_ENV: sandbox
          CLIENT_URL: http://localhost:3000

      - name: Run __simulation__.js against the live server
        run: node __simulation__.js
        continue-on-error: true # see CHANGELOG_PHASE9.md — this script silently skips admin-gated checks
        # if SEED_SUPER_ADMIN_EMAIL/PASSWORD aren't seeded into the CI database first.

  code-quality:
    name: Code quality checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies for root
        run: npm ci

      - name: Check for package lock changes
        run: |
          git diff --name-only HEAD~1 HEAD | grep -q "package-lock.json" && echo "Lock file changed" || echo "No lock file changes"
        continue-on-error: true

      - name: Validate commit messages
        run: |
          # Add basic commit validation
          COMMIT_MSG=$(git log --format=%s -n 1 HEAD)
          if [[ ${#COMMIT_MSG} -gt 72 ]]; then
            echo "Warning: Commit message is longer than 72 characters"
          fi