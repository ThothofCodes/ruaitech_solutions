version: '3.8'

services:
  backend:
    build:
      context: ./backend
    ports:
      - "5001:5001"
    environment:
      - NODE_ENV=production
      - MONGO_URI=${MONGO_URI:-mongodb://mongo:27017/ruaitech}
      - JWT_SECRET=${JWT_SECRET:-default_secret_for_dev}
      - SUPER_ADMIN_EMAIL=${SUPER_ADMIN_EMAIL:-admin@example.com}
      - MPESA_ENV=${MPESA_ENV:-sandbox}
      - CLIENT_URL=${CLIENT_URL:-http://localhost:3000}
      - PORT=5001
    depends_on:
      - mongo
    volumes:
      - ./backend/uploads:/app/uploads  # For file uploads
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:5001}
    depends_on:
      - backend
    networks:
      - app-network

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - app-network

volumes:
  mongo-data:

networks:
  app-network:
    driver: bridge