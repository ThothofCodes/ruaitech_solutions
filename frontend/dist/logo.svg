<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="512" height="512">
  <defs>
    <linearGradient id="bgG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0d1f"/>
      <stop offset="100%" style="stop-color:#0d0812"/>
    </linearGradient>
    <radialGradient id="sg" cx="50%" cy="25%" r="55%">
      <stop offset="0%" style="stop-color:#5c2a4a;stop-opacity:0.55"/>
      <stop offset="100%" style="stop-color:#110a1e;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="f1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c8647a"/><stop offset="100%" style="stop-color:#7a3050"/>
    </linearGradient>
    <linearGradient id="f2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3a1c4a"/><stop offset="100%" style="stop-color:#1e0c2e"/>
    </linearGradient>
    <linearGradient id="f3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9b3a6a"/><stop offset="100%" style="stop-color:#5a1e3a"/>
    </linearGradient>
    <linearGradient id="f4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4788a"/><stop offset="100%" style="stop-color:#8c2a50"/>
    </linearGradient>
    <linearGradient id="f5" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#4a1a3c"/><stop offset="100%" style="stop-color:#2a0c24"/>
    </linearGradient>
    <linearGradient id="f6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6c223c"/><stop offset="100%" style="stop-color:#3a0e22"/>
    </linearGradient>
    <linearGradient id="kG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0c0cc"/><stop offset="100%" style="stop-color:#c86880"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="500" height="500" fill="url(#bgG)"/>
  <rect width="500" height="500" fill="url(#sg)"/>

  <!-- Hexagonal gem facets -->
  <g transform="translate(250,175)">
    <polygon points="0,-80 69,-40 38,-10 5,-42"    fill="url(#f1)" opacity="0.92"/>
    <polygon points="69,-40 69,40 36,14 38,-10"    fill="url(#f2)" opacity="0.95"/>
    <polygon points="69,40 0,80 -8,44 36,14"       fill="url(#f3)" opacity="0.90"/>
    <polygon points="0,80 -69,40 -38,10 -8,44"     fill="url(#f4)" opacity="0.88"/>
    <polygon points="-69,40 -69,-40 -36,-14 -38,10" fill="url(#f5)" opacity="0.95"/>
    <polygon points="-69,-40 0,-80 5,-42 -36,-14"  fill="url(#f6)" opacity="0.90"/>

    <!-- K monogram -->
    <g fill="url(#kG)" opacity="0.92">
      <rect x="-9" y="-30" width="9" height="60" rx="1"/>
      <polygon points="0,-30 28,-30 6,0 0,0"/>
      <polygon points="0,0 6,0 28,30 0,30"/>
    </g>

    <!-- Hex outline -->
    <polygon points="0,-80 69,-40 69,40 0,80 -69,40 -69,-40"
      fill="none" stroke="#e07090" stroke-width="1" opacity="0.25"/>
  </g>

  <!-- RUAI wordmark -->
  <text x="250" y="310"
    font-family="Georgia,serif"
    font-size="82"
    font-weight="700"
    letter-spacing="10"
    text-anchor="middle"
    fill="#c8506a">RUAI</text>

  <!-- Divider -->
  <line x1="170" y1="322" x2="330" y2="322" stroke="#5c2a3a" stroke-width="0.8" opacity="0.6"/>

  <!-- TECH SOLUTIONS sub-wordmark -->
  <text x="250" y="358"
    font-family="Georgia,serif"
    font-size="22"
    letter-spacing="9"
    text-anchor="middle"
    fill="#7a3a52">TECH SOLUTIONS</text>
</svg>
